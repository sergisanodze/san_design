<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>San_Design</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="#" class="logo">San_Design</a>

    <nav class="nav" aria-label="Main navigation">
      <a href="#">Home</a>
      <a href="#">Products</a>
      <a href="#">Materials</a>
      <a href="#">About us</a>
    </nav>

    <a href="#" class="whatsapp" aria-label="WhatsApp"></a>
  </div>
</header>

<main>
  <section class="hero">
    <div class="container hero-grid">
      <div class="hero-content">
        <h1>Modern Kitchen Furniture</h1>
        <div class="line"></div>
        <p>Discover our modern kitchen furniture collection designed for both style and functionality.</p>
        <a href="#" class="btn">Learn More</a>
      </div>

      <div class="hero-image">
        <img src="images/kitchen.jpg" alt="" />
      </div>
    </div>
  </section>

  <section class="section light">
  <div class="container">
    <h2 class="section-title">Furniture</h2>

    <div class="cards three">
      <article class="card">
        <img src="images/wardrobe.jpg" alt="" />
        <a href="#" class="small-btn"></a>
      </article>

      <article class="card">
        <img src="images/bed.jpg" alt="" />
        <a href="#" class="small-btn"></a>
      </article>

      <article class="card">
        <img src="images/closet.jpg" alt="" />
        <a href="#" class="small-btn"></a>
      </article>
    </div>
  </div>
</section>

  <section class="section dark">
    <div class="container">
      <h2 class="section-title">Services</h2>

      <div class="features">
        <article class="feature"></article>
        <article class="feature"></article>
        <article class="feature"></article>
      </div>
    </div>
  </section>

  <section class="section wood">
    <div class="container">
      <h2 class="section-title">Advantages</h2>

      <div class="features">
        <article class="feature"></article>
        <article class="feature"></article>
        <article class="feature"></article>
      </div>
    </div>
  </section>

  <section class="section dark">
    <div class="container">
      <h2 class="section-title">Recommendations</h2>

      <div class="cards three faded">
        <article class="card">
          <img src="images/kitchen.jpg" alt="" />
        </article>

        <article class="card">
          <img src="images/kitchen.jpg" alt="" />
        </article>

        <article class="card">
          <img src="images/kitchen.jpg" alt="" />
        </article>
      </div>
    </div>
  </section>

  <section class="section dark contact-section">
    <div class="container">
      <h2 class="section-title">Contact</h2>

      <form class="contact-form">
        <label>
          <span class="sr-only">Email</span>
          <input type="email" placeholder="email" />
        </label>

        <label>
          <span class="sr-only">Title</span>
          <input type="text" placeholder="Title" />
        </label>

        <label>
          <span class="sr-only">Message</span>
          <textarea rows="5"></textarea>
        </label>

        <button type="submit" class="btn form-btn"></button>
      </form>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container footer-inner">
    <a href="#" class="logo">San_Design</a>

    <address class="phones">
       + 995 597 001 891<br/>
       + 995 598 480 906
    </address>

    <div class="socials">
      <a href="#" aria-label="Facebook"></a>
      <a href="#" aria-label="Instagram"></a>
      <a href="#" aria-label="WhatsApp"></a>
    </div>
  </div>
</footer>

</body>
</html>
